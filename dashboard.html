<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Feather Auto Monitor</title>
    <style>
      :root {
        --bg: #f6f8fb;
        --surface: #ffffff;
        --surface-subtle: #f1f5f4;
        --ink: #171f2a;
        --muted: #697384;
        --border: #d9e0e8;
        --border-strong: #bac4d1;
        --accent: #0f766e;
        --accent-strong: #115e59;
        --success: #15803d;
        --warning: #b45309;
        --danger: #b91c1c;
        --danger-strong: #991b1b;
        --code-bg: #111827;
        --code-ink: #e5e7eb;
        --radius: 6px;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--ink);
        background: var(--bg);
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        background: var(--bg);
      }

      button,
      input,
      select,
      textarea {
        font: inherit;
      }

      .app {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      .topbar {
        min-height: 64px;
        display: grid;
        grid-template-columns: minmax(260px, 1fr) auto auto;
        align-items: center;
        gap: 16px;
        padding: 12px 20px;
        color: #f9fafb;
        background: #20242b;
        border-bottom: 1px solid #313741;
      }

      h1 {
        margin: 0;
        font-size: 18px;
        line-height: 1.2;
        font-weight: 700;
      }

      .pathline {
        margin-top: 4px;
        max-width: 920px;
        overflow: hidden;
        color: #aab3c1;
        font-size: 12px;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .top-actions,
      .actions {
        display: flex;
        gap: 8px;
        align-items: center;
        flex-wrap: wrap;
      }

      .shell {
        width: 100%;
        max-width: 1440px;
        margin: 0 auto;
        padding: 16px;
        display: grid;
        grid-template-columns: 380px minmax(0, 1fr);
        gap: 16px;
      }

      .rail,
      .main {
        display: flex;
        flex-direction: column;
        gap: 12px;
        min-width: 0;
      }

      .panel {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
      }

      .panel-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        min-height: 42px;
        padding: 11px 12px;
        border-bottom: 1px solid var(--border);
      }

      .panel-title {
        margin: 0;
        font-size: 13px;
        font-weight: 700;
      }

      .panel-body {
        padding: 12px;
      }

      .field {
        margin-bottom: 12px;
      }

      .field:last-child {
        margin-bottom: 0;
      }

      label,
      .label {
        display: block;
        margin-bottom: 5px;
        color: var(--muted);
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
      }

      input,
      select,
      textarea {
        width: 100%;
        min-height: 36px;
        border: 1px solid var(--border-strong);
        border-radius: var(--radius);
        background: #ffffff;
        color: var(--ink);
        padding: 8px 9px;
        outline: none;
      }

      input:focus,
      select:focus,
      textarea:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.14);
      }

      textarea {
        min-height: 230px;
        resize: vertical;
        font-family: "Cascadia Code", Consolas, monospace;
        font-size: 12px;
        line-height: 1.45;
      }

      .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      .toggle-list {
        display: grid;
        gap: 8px;
        margin: 2px 0 12px;
      }

      .switch {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        min-height: 38px;
        padding: 7px 9px;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: var(--surface-subtle);
        color: var(--ink);
      }

      .switch span {
        font-size: 13px;
        font-weight: 650;
      }

      .switch input {
        width: 16px;
        min-height: 16px;
        accent-color: var(--accent);
      }

      button {
        min-height: 36px;
        border: 1px solid var(--border-strong);
        border-radius: var(--radius);
        background: #ffffff;
        color: var(--ink);
        padding: 8px 12px;
        font-weight: 700;
        cursor: pointer;
      }

      button:hover {
        border-color: #8c99a8;
        background: #f8fafc;
      }

      button.primary {
        border-color: var(--accent);
        background: var(--accent);
        color: #ffffff;
      }

      button.primary:hover {
        border-color: var(--accent-strong);
        background: var(--accent-strong);
      }

      button.danger {
        border-color: var(--danger);
        background: var(--danger);
        color: #ffffff;
      }

      button.danger:hover {
        border-color: var(--danger-strong);
        background: var(--danger-strong);
      }

      button:disabled {
        opacity: 0.48;
        cursor: not-allowed;
      }

      .action-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      .action-grid .wide {
        grid-column: 1 / -1;
      }

      .message {
        min-height: 18px;
        margin-top: 10px;
        color: var(--warning);
        font-size: 12px;
        font-weight: 650;
      }

      .run-pill {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        min-height: 34px;
        padding: 7px 10px;
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: var(--radius);
        background: rgba(255, 255, 255, 0.08);
        font-size: 13px;
        font-weight: 700;
      }

      .dot {
        width: 9px;
        height: 9px;
        border-radius: 50%;
        background: #9ca3af;
      }

      .dot.monitoring,
      .dot.running {
        background: var(--success);
      }

      .dot.found,
      .dot.claim_failed_continuing {
        background: var(--warning);
      }

      .dot.claimed {
        background: #0284c7;
      }

      .metric-grid {
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 0;
      }

      .metric {
        min-height: 86px;
        padding: 12px;
        border-right: 1px solid var(--border);
      }

      .metric:last-child {
        border-right: 0;
      }

      .metric .label {
        margin-bottom: 8px;
      }

      .metric-value {
        display: block;
        min-height: 26px;
        font-size: 20px;
        line-height: 1.2;
        font-weight: 760;
        word-break: break-word;
      }

      .metric-note {
        display: block;
        margin-top: 4px;
        color: var(--muted);
        font-size: 12px;
      }

      .task-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px 18px;
      }

      .kv {
        min-width: 0;
      }

      .kv .label {
        margin-bottom: 3px;
      }

      .kv-value {
        min-height: 20px;
        color: var(--ink);
        font-size: 13px;
        font-weight: 650;
        word-break: break-word;
      }

      .kv-value.muted {
        color: var(--muted);
        font-weight: 600;
      }

      .log-panel {
        min-height: 0;
      }

      .log-body {
        padding: 0;
      }

      pre {
        margin: 0;
        white-space: pre-wrap;
        word-break: break-word;
        font-family: "Cascadia Code", Consolas, monospace;
        font-size: 12px;
        line-height: 1.45;
      }

      .log {
        min-height: 520px;
        max-height: calc(100vh - 315px);
        overflow: auto;
        border-radius: 0 0 var(--radius) var(--radius);
        background: var(--code-bg);
        color: var(--code-ink);
        padding: 12px;
      }

      .small {
        color: var(--muted);
        font-size: 12px;
      }

      @media (max-width: 1100px) {
        .topbar {
          grid-template-columns: 1fr;
        }

        .shell {
          grid-template-columns: 1fr;
        }

        .metric-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .metric {
          border-right: 0;
          border-bottom: 1px solid var(--border);
        }

        .metric:last-child {
          border-bottom: 0;
        }
      }

      @media (max-width: 640px) {
        .shell {
          padding: 10px;
        }

        .topbar {
          padding: 12px;
        }

        .row,
        .task-grid,
        .metric-grid {
          grid-template-columns: 1fr;
        }

        .action-grid {
          grid-template-columns: 1fr;
        }

        .action-grid .wide {
          grid-column: auto;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <div>
          <h1>Feather Auto Monitor</h1>
          <div class="pathline" id="paths">Loading paths...</div>
        </div>
        <div class="run-pill"><span class="dot" id="dot"></span><span id="running">stopped</span></div>
        <div class="top-actions">
          <button id="refresh">Refresh</button>
          <button id="stop" class="danger">Stop</button>
        </div>
      </header>

      <div class="shell">
        <aside class="rail">
          <section class="panel">
            <div class="panel-header">
              <h2 class="panel-title">Monitor</h2>
              <span class="small" id="server">-</span>
            </div>
            <div class="panel-body">
              <div class="field">
                <label for="campaignId">Campaign</label>
                <select id="campaignId">
                  <option value="929712fc-fa2a-45bc-94df-2ae6d445b2ca">Raw creation campaign</option>
                </select>
              </div>

              <div class="field">
                <label for="batchSuffix">Batch suffix</label>
                <input id="batchSuffix" value="-raw-creation" />
              </div>

              <div class="row">
                <div class="field">
                  <label for="intervalMin">Interval min</label>
                  <input id="intervalMin" type="number" min="1" step="0.1" value="1.2" />
                </div>
                <div class="field">
                  <label for="intervalMax">Interval max</label>
                  <input id="intervalMax" type="number" min="1" step="0.1" value="3.8" />
                </div>
              </div>

              <div class="toggle-list">
                <label class="switch"><span>Claim</span><input id="claim" type="checkbox" checked /></label>
                <label class="switch"><span>Open task on success</span><input id="openTask" type="checkbox" checked /></label>
              </div>

              <div class="action-grid">
                <button id="start" class="primary wide">Start / Restart</button>
                <button id="saveCurl">Save cURL</button>
                <button id="stop2" class="danger">Stop</button>
              </div>
              <div class="message" id="message"></div>
            </div>
          </section>

          <section class="panel">
            <div class="panel-header">
              <h2 class="panel-title">Request cURL</h2>
              <span class="small" id="curlSaved">-</span>
            </div>
            <div class="panel-body">
              <textarea id="curlText" spellcheck="false" placeholder="curl 'https://feather.openai.com/api/v2/tasks/search' ..."></textarea>
            </div>
          </section>
        </aside>

        <main class="main">
          <section class="panel">
            <div class="metric-grid">
              <div class="metric">
                <span class="label">State</span>
                <span class="metric-value" id="state">-</span>
                <span class="metric-note" id="phase">-</span>
              </div>
              <div class="metric">
                <span class="label">Unclaimed</span>
                <span class="metric-value" id="unclaimed">-</span>
                <span class="metric-note" id="lastPoll">-</span>
              </div>
              <div class="metric">
                <span class="label">Next poll</span>
                <span class="metric-value" id="nextPoll">-</span>
                <span class="metric-note">random interval</span>
              </div>
              <div class="metric">
                <span class="label">Batch matches</span>
                <span class="metric-value" id="batchMatches">-</span>
                <span class="metric-note" id="batchSuffixView">-</span>
              </div>
              <div class="metric">
                <span class="label">Mode</span>
                <span class="metric-value" id="mode">-</span>
                <span class="metric-note" id="updated">-</span>
              </div>
            </div>
          </section>

          <section class="panel">
            <div class="panel-header">
              <h2 class="panel-title">Current task</h2>
              <span class="small" id="campaignView">-</span>
            </div>
            <div class="panel-body">
              <div class="task-grid">
                <div class="kv">
                  <span class="label">Task id</span>
                  <div class="kv-value muted" id="taskId">-</div>
                </div>
                <div class="kv">
                  <span class="label">Title</span>
                  <div class="kv-value muted" id="taskTitle">-</div>
                </div>
                <div class="kv">
                  <span class="label">Batch</span>
                  <div class="kv-value muted" id="taskBatch">-</div>
                </div>
                <div class="kv">
                  <span class="label">Saved JSON</span>
                  <div class="kv-value muted" id="taskSaved">-</div>
                </div>
              </div>
            </div>
          </section>

          <section class="panel log-panel">
            <div class="panel-header">
              <h2 class="panel-title">Event log</h2>
              <span class="small" id="logMeta">-</span>
            </div>
            <div class="log-body">
              <pre class="log" id="log">Loading...</pre>
            </div>
          </section>
        </main>
      </div>
    </div>

    <script>
      let latest = null;

      const $ = (id) => document.getElementById(id);

      function setMessage(text) {
        $("message").textContent = text || "";
      }

      function setText(id, value, fallback = "-") {
        $(id).textContent = value == null || value === "" ? fallback : String(value);
      }

      async function api(path, options = {}) {
        const response = await fetch(path, {
          cache: "no-store",
          headers: { "Content-Type": "application/json", ...(options.headers || {}) },
          ...options,
        });
        const body = await response.json();
        if (!response.ok || body.ok === false) throw new Error(body.error || response.statusText);
        return body;
      }

      function ageText(iso) {
        if (!iso) return "-";
        const then = new Date(iso.replace(/([+-]\d{2})(\d{2})$/, "$1:$2"));
        const seconds = Math.max(0, Math.round((Date.now() - then.getTime()) / 1000));
        return `${seconds}s ago`;
      }

      function renderCampaigns(campaigns, selectedId) {
        const select = $("campaignId");
        const items = Array.isArray(campaigns) && campaigns.length ? campaigns : [];
        const signature = JSON.stringify(items.map((campaign) => [campaign.id, campaign.name]));
        const current = select.value;
        if (select.dataset.signature !== signature) {
          select.innerHTML = "";
          for (const campaign of items) {
            const option = document.createElement("option");
            option.value = campaign.id;
            option.textContent = campaign.name || campaign.id;
            select.appendChild(option);
          }
          select.dataset.signature = signature;
        }
        const nextValue = current || selectedId || items[0]?.id || "";
        if (nextValue) select.value = nextValue;
      }

      function modeText(status) {
        const claim = Boolean(status.claim ?? $("claim").checked);
        const open = $("openTask").checked;
        if (claim) return "claim";
        if (open) return "open";
        return "observe";
      }

      function batchText(batch) {
        if (!batch) return "-";
        return batch.task_batch_name || batch.task_batch_id || JSON.stringify(batch);
      }

      function cleanLog(text) {
        return (text || "No log yet.").replace(/\u0007/g, "");
      }

      async function refresh() {
        latest = await api("/api/state");
        const status = latest.status || {};
        const running = latest.running;
        const state = running ? status.state || "running" : "stopped";
        const phase = status.phase || "-";

        renderCampaigns(latest.campaigns, status.campaign_id);

        setText("running", running ? `running (${latest.worker_id || "worker"})` : "stopped");
        setText("state", state);
        setText("phase", running ? phase : "-");
        setText("unclaimed", status.unclaimed_count);
        setText("lastPoll", status.last_poll ? `last poll ${status.last_poll}` : "-");
        setText("nextPoll", status.next_sleep_seconds == null ? (running && phase === "polling" ? "now" : "-") : `${status.next_sleep_seconds}s`);
        setText("batchMatches", status.active_batch_matches);
        setText("batchSuffixView", status.batch_suffix || $("batchSuffix").value || "-");
        setText("mode", modeText(status));
        setText("updated", ageText(status.updated_at));
        setText("server", latest.server_pid ? `server ${latest.server_pid}` : "-");
        setText("curlSaved", latest.curl_saved ? "saved" : "empty");
        setText("campaignView", status.campaign_name || status.campaign_id || $("campaignId").selectedOptions[0]?.textContent);
        setText("taskId", status.task_id);
        setText("taskTitle", status.title);
        setText("taskBatch", batchText(status.batch));
        setText("taskSaved", status.saved);

        $("dot").className = `dot ${running ? state : ""}`;
        $("paths").textContent = latest.paths ? `${latest.paths.log} | ${latest.paths.status}` : "";
        $("logMeta").textContent = latest.paths?.log || "-";
        $("log").textContent = cleanLog(latest.log_tail);
        $("log").scrollTop = $("log").scrollHeight;
        $("stop").disabled = !running;
        $("stop2").disabled = !running;
      }

      function configFromForm() {
        return {
          curlText: $("curlText").value,
          campaignId: $("campaignId").value.trim(),
          batchSuffix: $("batchSuffix").value.trim(),
          intervalMin: Number($("intervalMin").value),
          intervalMax: Number($("intervalMax").value),
          claim: $("claim").checked,
          openTask: $("openTask").checked,
        };
      }

      async function start() {
        setMessage("Starting...");
        const result = await api("/api/start", {
          method: "POST",
          body: JSON.stringify(configFromForm()),
        });
        $("curlText").value = "";
        setMessage(`Started worker ${result.worker_id || ""}`.trim());
        await refresh();
      }

      async function stop() {
        setMessage("Stopping...");
        const result = await api("/api/stop", { method: "POST", body: "{}" });
        setMessage(result.stopped ? "Stop requested." : "No running monitor.");
        await refresh();
      }

      async function saveCurl() {
        setMessage("Saving cURL...");
        await api("/api/save-curl", {
          method: "POST",
          body: JSON.stringify({ curlText: $("curlText").value }),
        });
        $("curlText").value = "";
        setMessage("cURL saved.");
        await refresh();
      }

      $("refresh").addEventListener("click", () => refresh().catch((error) => setMessage(error.message)));
      $("start").addEventListener("click", () => start().catch((error) => setMessage(error.message)));
      $("stop").addEventListener("click", () => stop().catch((error) => setMessage(error.message)));
      $("stop2").addEventListener("click", () => stop().catch((error) => setMessage(error.message)));
      $("saveCurl").addEventListener("click", () => saveCurl().catch((error) => setMessage(error.message)));

      refresh().catch((error) => setMessage(error.message));
      setInterval(() => refresh().catch(() => {}), 1000);
    </script>
  </body>
</html>
