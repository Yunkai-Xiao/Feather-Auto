<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Feather Auto Monitor</title>
    <style>
      :root {
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #101624;
        color: #e5e7eb;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: #101624;
      }

      main {
        max-width: 1240px;
        margin: 0 auto;
        padding: 22px;
      }

      header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 16px;
        margin-bottom: 16px;
      }

      h1 {
        margin: 0;
        font-size: 22px;
        font-weight: 680;
      }

      .meta {
        margin-top: 4px;
        color: #9ca3af;
        font-size: 13px;
      }

      .panel {
        background: #1f2937;
        border: 1px solid #374151;
        border-radius: 8px;
        padding: 14px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 12px;
        margin-bottom: 12px;
      }

      .two {
        display: grid;
        grid-template-columns: 420px minmax(0, 1fr);
        gap: 12px;
        align-items: start;
      }

      label,
      .label {
        display: block;
        margin-bottom: 6px;
        color: #9ca3af;
        font-size: 12px;
        text-transform: uppercase;
      }

      .value {
        font-size: 18px;
        font-weight: 650;
        word-break: break-word;
      }

      .status {
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }

      .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #9ca3af;
      }

      .dot.running,
      .dot.monitoring,
      .dot.polling,
      .dot.sleeping {
        background: #22c55e;
      }

      .dot.found {
        background: #eab308;
      }

      .dot.claimed {
        background: #38bdf8;
      }

      .dot.claim_failed_continuing {
        background: #f97316;
      }

      input,
      select,
      textarea {
        width: 100%;
        border: 1px solid #4b5563;
        border-radius: 6px;
        background: #111827;
        color: #f9fafb;
        padding: 9px 10px;
        font: inherit;
      }

      textarea {
        min-height: 170px;
        resize: vertical;
        font-family: "Cascadia Code", Consolas, monospace;
        font-size: 12px;
      }

      .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-bottom: 10px;
      }

      .checkrow {
        display: flex;
        gap: 14px;
        align-items: center;
        margin: 12px 0;
      }

      .checkrow label {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        margin: 0;
        text-transform: none;
        color: #e5e7eb;
      }

      .checkrow input {
        width: auto;
      }

      button {
        border: 1px solid #4b5563;
        border-radius: 6px;
        background: #374151;
        color: #f9fafb;
        padding: 9px 12px;
        cursor: pointer;
      }

      button.primary {
        border-color: #0284c7;
        background: #0369a1;
      }

      button.danger {
        border-color: #b91c1c;
        background: #991b1b;
      }

      button:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }

      .actions {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      pre {
        margin: 0;
        white-space: pre-wrap;
        word-break: break-word;
        font-family: "Cascadia Code", Consolas, monospace;
        font-size: 12px;
        line-height: 1.45;
      }

      .log {
        min-height: 520px;
        max-height: calc(100vh - 280px);
        overflow: auto;
        background: #030712;
      }

      .message {
        min-height: 20px;
        color: #fbbf24;
        font-size: 13px;
        margin-top: 10px;
      }

      @media (max-width: 920px) {
        main {
          padding: 14px;
        }

        header,
        .two {
          display: block;
        }

        .grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .panel {
          margin-bottom: 12px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>Feather Auto Monitor</h1>
          <div class="meta" id="paths">Loading paths...</div>
        </div>
        <div class="actions">
          <button id="refresh">Refresh</button>
          <button id="stop" class="danger">Stop</button>
        </div>
      </header>

      <section class="grid">
        <div class="panel">
          <div class="label">Worker</div>
          <div class="value status"><span class="dot" id="dot"></span><span id="running">unknown</span></div>
        </div>
        <div class="panel">
          <div class="label">State</div>
          <div class="value" id="state">-</div>
        </div>
        <div class="panel">
          <div class="label">Unclaimed</div>
          <div class="value" id="unclaimed">-</div>
        </div>
        <div class="panel">
          <div class="label">Next Poll</div>
          <div class="value" id="sleep">-</div>
        </div>
      </section>

      <section class="two">
        <div class="panel">
          <label for="curlText">Feather cURL</label>
          <textarea id="curlText" placeholder="Paste Copy-as-cURL here. It is saved only in outputs/current_feather_request.curl.txt."></textarea>

          <div class="row" style="margin-top: 12px">
            <div>
              <label for="campaignId">Campaign</label>
              <select id="campaignId">
                <option value="929712fc-fa2a-45bc-94df-2ae6d445b2ca">Raw creation campaign</option>
              </select>
            </div>
            <div>
              <label for="batchSuffix">Batch Suffix</label>
              <input id="batchSuffix" value="-raw-creation" />
            </div>
          </div>

          <div class="row">
            <div>
              <label for="intervalMin">Interval Min</label>
              <input id="intervalMin" type="number" min="1" step="0.1" value="1.2" />
            </div>
            <div>
              <label for="intervalMax">Interval Max</label>
              <input id="intervalMax" type="number" min="1" step="0.1" value="3.8" />
            </div>
          </div>

          <div class="checkrow">
            <label><input id="claim" type="checkbox" checked /> Claim</label>
            <label><input id="openTask" type="checkbox" checked /> Open task on success</label>
          </div>

          <div class="actions">
            <button id="saveCurl">Save cURL</button>
            <button id="start" class="primary">Start / Restart</button>
            <button id="stop2" class="danger">Stop</button>
          </div>
          <div class="message" id="message"></div>
        </div>

        <div>
          <section class="panel">
            <div class="label">Current Task</div>
            <pre id="task">-</pre>
          </section>
          <section class="panel log" style="margin-top: 12px">
            <div class="label">Log</div>
            <pre id="log">Loading...</pre>
          </section>
        </div>
      </section>
    </main>

    <script>
      let latest = null;

      const $ = (id) => document.getElementById(id);

      function setMessage(text) {
        $("message").textContent = text || "";
      }

      async function api(path, options = {}) {
        const response = await fetch(path, {
          cache: "no-store",
          headers: { "Content-Type": "application/json", ...(options.headers || {}) },
          ...options,
        });
        const body = await response.json();
        if (!response.ok || body.ok === false) throw new Error(body.error || response.statusText);
        return body;
      }

      function ageText(iso) {
        if (!iso) return "-";
        const then = new Date(iso.replace(/([+-]\d{2})(\d{2})$/, "$1:$2"));
        const seconds = Math.max(0, Math.round((Date.now() - then.getTime()) / 1000));
        return `${seconds}s ago`;
      }

      function renderCampaigns(campaigns, selectedId) {
        const select = $("campaignId");
        const items = Array.isArray(campaigns) && campaigns.length ? campaigns : [];
        const signature = JSON.stringify(items.map((campaign) => [campaign.id, campaign.name]));
        const current = select.value;
        if (select.dataset.signature !== signature) {
          select.innerHTML = "";
          for (const campaign of items) {
            const option = document.createElement("option");
            option.value = campaign.id;
            option.textContent = campaign.name || campaign.id;
            select.appendChild(option);
          }
          select.dataset.signature = signature;
        }
        const nextValue = current || selectedId || items[0]?.id || "";
        if (nextValue) select.value = nextValue;
      }

      async function refresh() {
        latest = await api("/api/state");
        const status = latest.status || {};
        const running = latest.running;
        renderCampaigns(latest.campaigns, status.campaign_id);
        const state = running ? status.state || "running" : "stopped";
        $("running").textContent = running ? `running (${latest.worker_id || "worker"})` : "stopped";
        $("state").textContent = state;
        $("unclaimed").textContent = status.unclaimed_count ?? "-";
        $("sleep").textContent =
          status.next_sleep_seconds == null ? (running && status.phase === "polling" ? "now" : "-") : `${status.next_sleep_seconds}s`;
        $("dot").className = `dot ${running ? state : ""}`;
        $("paths").textContent = `${latest.paths.log} | ${latest.paths.status}`;
        $("task").textContent = JSON.stringify(
          {
            updated: ageText(status.updated_at),
            campaign: status.campaign_name || status.campaign_id,
            phase: status.phase,
            task_id: status.task_id,
            title: status.title,
            batch: status.batch,
            saved: status.saved,
            curl_saved: latest.curl_saved,
          },
          null,
          2,
        );
        $("log").textContent = latest.log_tail || "No log yet.";
        $("log").parentElement.scrollTop = $("log").parentElement.scrollHeight;
      }

      function configFromForm() {
        return {
          curlText: $("curlText").value,
          campaignId: $("campaignId").value.trim(),
          batchSuffix: $("batchSuffix").value.trim(),
          intervalMin: Number($("intervalMin").value),
          intervalMax: Number($("intervalMax").value),
          claim: $("claim").checked,
          openTask: $("openTask").checked,
        };
      }

      async function start() {
        setMessage("Starting...");
        const result = await api("/api/start", {
          method: "POST",
          body: JSON.stringify(configFromForm()),
        });
        $("curlText").value = "";
        setMessage(`Started worker ${result.worker_id || ""}`.trim());
        await refresh();
      }

      async function stop() {
        setMessage("Stopping...");
        const result = await api("/api/stop", { method: "POST", body: "{}" });
        setMessage(result.stopped ? "Stop requested." : "No running monitor.");
        await refresh();
      }

      async function saveCurl() {
        setMessage("Saving cURL...");
        await api("/api/save-curl", {
          method: "POST",
          body: JSON.stringify({ curlText: $("curlText").value }),
        });
        $("curlText").value = "";
        setMessage("cURL saved.");
        await refresh();
      }

      $("refresh").addEventListener("click", () => refresh().catch((error) => setMessage(error.message)));
      $("start").addEventListener("click", () => start().catch((error) => setMessage(error.message)));
      $("stop").addEventListener("click", () => stop().catch((error) => setMessage(error.message)));
      $("stop2").addEventListener("click", () => stop().catch((error) => setMessage(error.message)));
      $("saveCurl").addEventListener("click", () => saveCurl().catch((error) => setMessage(error.message)));

      refresh().catch((error) => setMessage(error.message));
      setInterval(() => refresh().catch(() => {}), 1000);
    </script>
  </body>
</html>
